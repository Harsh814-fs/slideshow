<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Slideshow Admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a18;
    }

    .card {
      background: #fff;
      border: 1px solid #e4e4de;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    .logo-wrap img {
      height: 72px;
      width: auto;
      object-fit: contain;
    }

    .divider {
      height: 1px;
      background: #e4e4de;
      margin-bottom: 24px;
    }

    h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 0.82rem; color: #7a7a72; margin-bottom: 28px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.78rem; font-weight: 500; color: #4a4a42; margin-bottom: 6px; }
    .field input {
      width: 100%;
      background: #f5f5f0;
      border: 1px solid #d0d0c8;
      border-radius: 7px;
      padding: 9px 12px;
      font-size: 0.88rem;
      color: #1a1a18;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #2d5a3d; background: #fff; }
    .field input::placeholder { color: #b0b0a8; }

    .error {
      background: #fdf0ee;
      border: 1px solid #f5c6c2;
      color: #c0392b;
      font-size: 0.78rem;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .btn {
      width: 100%;
      background: #2d5a3d;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn:hover { background: #3a7a52; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/logo.png" alt="Diyanet Danmark"/>
    </div>
    <div class="divider"></div>

    <h1>Sign in</h1>
    <p class="sub">Admin access only</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required/>
      </div>
      <button class="btn" type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
